<VirtualHost *:80>

    WSGIDaemonProcess apache-flask processes=1 threads=15
    WSGIProcessGroup apache-flask
    WSGIApplicationGroup %{GLOBAL}
    WSGIScriptAlias / /var/www/apache-flask/apache-flask.wsgi
    ServerName localhost

    <Directory "/var/www/apache-flask/">
        Header set Access-Control-Allow-Origin "*"
        Options +ExecCGI
        Require all granted
    </Directory>

    Alias /static /var/www/apache-flask/app/static
    <Directory /var/www/apache-flask/app/static/>
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    LogLevel warn
    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>
