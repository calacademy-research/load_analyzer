version: "3.4"

services:

  # App Service
  app:
    # Configuration for building the docker image for the service
    build:
      context: . # Use an image built from the specified dockerfile in the current directory.
      dockerfile: Dockerfile.monitor

    restart: always
    depends_on:
      - mysql
    volumes:
        - .:/app
        - /admin/monitor-keys/monitor_ed25519:/app/monitor_key:ro
        - /admin/monitor-keys/monitor_hosts.json:/app/monitor_hosts.json:ro
    links:
      - mysql:mysql
    extra_hosts:
     - "alice:10.4.90.183"
     - "rosalindf:10.4.90.182"
     - "tdobz:10.4.90.205"
     - "flor:10.4.90.176"
     - "ibss-spark-1:10.4.90.200"
     - "blackburn:10.4.90.175"
     - "deepsquid:10.4.90.168"
     - "deepsheep:10.4.90.192"
     - "rudra:10.4.90.132"
     - "kali:10.4.90.203"
     - "dirac:10.4.90.100"
    networks:
      - python


#
  mysql:
    restart: always
    image: mysql:8.4.0
    container_name: mysql
    command: "--mysql-native-password=ON"

    volumes:
      - ./data:/var/lib/mysql:delegated

    environment:
      MYSQL_ROOT_PASSWORD: qhALiqwRFNlOzwqnbXgGbKpgCZXUiSZvmAsRLlFIIMqjSQrf
      MYSQL_DATABASE: load
      TZ: America/Los_Angeles
      MYSQL_TCP_PORT: 3312

    ports:
      - "3312:3312"
    networks:
      - python

networks:
  python:
    driver: bridge
